<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .titles-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            background: #16213e;
        }

        .titles-header h2 {
            font-size: 18px;
            color: #e94560;
        }

        .btn-add {
            background: #e94560;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add:hover {
            transform: scale(1.1);
            background: #ff6b6b;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
        }

        .titles-list {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .title-card {
            background: #0f3460;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .title-card:hover {
            background: #1a4a7a;
            transform: translateX(5px);
        }

        .title-card.active {
            border-color: #e94560;
            background: #1a4a7a;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .title-card h3 {
            font-size: 16px;
            margin-bottom: 5px;
            padding-right: 30px;
            word-break: break-word;
        }

        .title-card .file-count {
            font-size: 12px;
            color: #a0a0a0;
        }

        .title-card .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #e94560;
            font-size: 18px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .title-card:hover .delete-btn {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0a0a0;
        }

        .empty-state p {
            margin: 10px 0;
            font-size: 14px;
        }

        /* Основная область */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0a0a1a;
        }

        /* Просмотрщик изображений */
        .viewer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
            position: relative;
            cursor: grab;
        }

        .image-container:active {
            cursor: grabbing;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .image-container img.zoomed {
            cursor: move;
        }

        /* Панель управления */
        .viewer-controls {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #0f3460;
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-controls button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .nav-controls button:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        .nav-controls button:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
        }

        .image-counter {
            color: #a0a0a0;
            font-size: 14px;
            margin: 0 15px;
            white-space: nowrap;
        }

        .zoom-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .zoom-controls button {
            background: #0f3460;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-controls button:hover {
            background: #1a4a7a;
        }

        .zoom-level {
            color: #a0a0a0;
            font-size: 12px;
            margin: 0 5px;
            min-width: 45px;
            text-align: center;
        }

        .image-info {
            color: #a0a0a0;
            font-size: 13px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Проводник файлов */
        .file-explorer {
            background: #16213e;
            border-top: 2px solid #0f3460;
            max-height: 250px;
            overflow-y: auto;
        }

        .file-explorer-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            position: sticky;
            top: 0;
            background: #16213e;
            z-index: 5;
        }

        .file-explorer-header h3 {
            color: #e94560;
            font-size: 16px;
        }

        #addFilesBtn {
            background: #0f3460;
            color: white;
            border: 2px dashed #e94560;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        #addFilesBtn:hover {
            background: #1a4a7a;
            border-color: #ff6b6b;
        }

        .file-list {
            list-style: none;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .file-item {
            background: #0f3460;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .file-item:hover {
            background: #1a4a7a;
            transform: translateY(-2px);
        }

        .file-item.active {
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
        }

        .file-item .thumbnail {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .file-item .file-info-mini {
            padding: 8px;
        }

        .file-item .file-name-mini {
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .file-item .delete-file-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(233, 69, 96, 0.9);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .file-item:hover .delete-file-btn {
            display: flex;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            min-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #e94560;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f3460;
            border: 1px solid #e94560;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
        }

        .btn-secondary {
            background: #0f3460;
            color: white;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        /* Полноэкранный режим */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-overlay img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        .close-fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 200px;
            }
            
            .file-explorer {
                max-height: 150px;
            }
            
            .viewer-controls {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="titles-header">
                <h2>🖼 Галерея</h2>
                <button class="btn-add" id="addTitleBtn" title="Создать альбом">+</button>
            </div>
            <div class="titles-list" id="titlesList">
                <div class="empty-state">
                    <p>📂 Нет альбомов</p>
                    <p>Нажмите + чтобы создать</p>
                </div>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-content">
            <div class="viewer-section">
                <!-- Контейнер изображения -->
                <div class="image-container" id="imageContainer">
                    <div class="empty-state">
                        <p>🖼 Выберите альбом и добавьте изображения</p>
                        <p>Поддерживаются длинные скриншоты и панорамы</p>
                    </div>
                </div>

                <!-- Панель управления -->
                <div class="viewer-controls">
                    <div class="nav-controls">
                        <button id="prevBtn" disabled>◀ Назад</button>
                        <span class="image-counter" id="imageCounter">0 / 0</span>
                        <button id="nextBtn" disabled>Вперед ▶</button>
                    </div>
                    
                    <div class="image-info" id="imageInfo"></div>
                    
                    <div class="zoom-controls">
                        <button id="zoomOutBtn" title="Уменьшить">−</button>
                        <span class="zoom-level" id="zoomLevel">100%</span>
                        <button id="zoomInBtn" title="Увеличить">+</button>
                        <button id="fitBtn" title="По размеру">⊡</button>
                        <button id="fullscreenBtn" title="Полный экран">⛶</button>
                    </div>
                </div>
            </div>

            <!-- Миниатюры файлов -->
            <div class="file-explorer">
                <div class="file-explorer-header">
                    <h3>📁 Файлы альбома</h3>
                    <button id="addFilesBtn">📤 Добавить изображения</button>
                    <input type="file" id="fileInput" multiple 
                           accept="image/*" style="display: none;">
                </div>
                <ul class="file-list" id="fileList">
                    <div class="empty-state">
                        <p>🖼 Перетащите изображения сюда</p>
                        <p>или нажмите кнопку "Добавить"</p>
                    </div>
                </ul>
            </div>
        </main>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="titleModal">
        <div class="modal-content">
            <h3>🖼 Новый альбом</h3>
            <input type="text" id="titleNameInput" 
                   placeholder="Название альбома" autofocus>
            <div class="modal-buttons">
                <button class="btn-secondary" id="cancelTitleBtn">Отмена</button>
                <button class="btn-primary" id="createTitleBtn">Создать</button>
            </div>
        </div>
    </div>

    <!-- Полноэкранный режим -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <button class="close-fullscreen" id="closeFullscreen">✕</button>
        <img id="fullscreenImage" src="" alt="Полноэкранный режим">
    </div>

    <script>
        class ImageGalleryApp {
            constructor() {
                this.albums = this.loadAlbums();
                this.currentAlbumId = null;
                this.currentImageIndex = -1;
                this.images = [];
                this.zoomLevel = 1;
                this.isDragging = false;
                this.dragStart = { x: 0, y: 0 };
                this.imagePosition = { x: 0, y: 0 };
                
                this.init();
            }

            init() {
                this.cacheDomElements();
                this.setupEventListeners();
                this.renderAlbums();
                
                if (this.albums.length > 0) {
                    this.selectAlbum(this.albums[0].id);
                }
            }

            cacheDomElements() {
                this.imageContainer = document.getElementById('imageContainer');
                this.imageCounter = document.getElementById('imageCounter');
                this.imageInfo = document.getElementById('imageInfo');
                this.zoomLevelEl = document.getElementById('zoomLevel');
                this.titlesList = document.getElementById('titlesList');
                this.fileList = document.getElementById('fileList');
                this.titleModal = document.getElementById('titleModal');
                this.titleNameInput = document.getElementById('titleNameInput');
                this.fullscreenOverlay = document.getElementById('fullscreenOverlay');
                this.fullscreenImage = document.getElementById('fullscreenImage');
            }

            loadAlbums() {
                try {
                    const saved = localStorage.getItem('imageGalleryAlbums');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                    return [];
                }
            }

            saveAlbums() {
                try {
                    // Не сохраняем blob URLs
                    const toSave = this.albums.map(album => ({
                        ...album,
                        files: album.files.map(f => ({
                            id: f.id,
                            name: f.name,
                            size: f.size,
                            url: f.url
                        }))
                    }));
                    localStorage.setItem('imageGalleryAlbums', JSON.stringify(toSave));
                } catch (e) {
                    console.error('Ошибка сохранения:', e);
                    alert('Не удалось сохранить. Возможно, закончилось место.');
                }
            }

            addAlbum(name) {
                const album = {
                    id: Date.now().toString(),
                    name: name,
                    files: [],
                    createdAt: new Date().toISOString()
                };
                
                this.albums.push(album);
                this.saveAlbums();
                this.renderAlbums();
                this.selectAlbum(album.id);
                return album;
            }

            deleteAlbum(id) {
                if (!confirm('Удалить альбом и все изображения?')) return;
                
                const album = this.albums.find(a => a.id === id);
                if (album) {
                    album.files.forEach(file => {
                        if (file.url) URL.revokeObjectURL(file.url);
                    });
                }
                
                this.albums = this.albums.filter(a => a.id !== id);
                
                if (this.currentAlbumId === id) {
                    this.currentAlbumId = this.albums.length > 0 ? this.albums[0].id : null;
                    if (this.currentAlbumId) {
                        this.selectAlbum(this.currentAlbumId);
                    } else {
                        this.clearViewer();
                    }
                }
                
                this.saveAlbums();
                this.renderAlbums();
            }

            selectAlbum(id) {
                this.currentAlbumId = id;
                const album = this.albums.find(a => a.id === id);
                
                if (album) {
                    this.images = album.files;
                    this.currentImageIndex = this.images.length > 0 ? 0 : -1;
                    this.renderFileList();
                    this.updateActiveAlbum();
                    
                    if (this.images.length > 0) {
                        this.showImage(0);
                    } else {
                        this.clearViewer();
                    }
                }
            }

            updateActiveAlbum() {
                document.querySelectorAll('.title-card').forEach(card => {
                    card.classList.toggle('active', card.dataset.id === this.currentAlbumId);
                });
            }

            renderAlbums() {
                if (this.albums.length === 0) {
                    this.titlesList.innerHTML = `
                        <div class="empty-state">
                            <p>📂 Нет альбомов</p>
                            <p>Нажмите + чтобы создать</p>
                        </div>
                    `;
                    return;
                }

                this.titlesList.innerHTML = this.albums.map(album => `
                    <div class="title-card ${album.id === this.currentAlbumId ? 'active' : ''}" 
                         data-id="${album.id}">
                        <h3>${this.escapeHtml(album.name)}</h3>
                        <div class="file-count">🖼 ${album.files.length} изображений</div>
                        <button class="delete-btn" data-delete-id="${album.id}" title="Удалить">🗑</button>
                    </div>
                `).join('');

                this.titlesList.querySelectorAll('.title-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('delete-btn')) {
                            this.selectAlbum(card.dataset.id);
                        }
                    });
                });

                this.titlesList.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteAlbum(btn.dataset.deleteId);
                    });
                });
            }

            handleFilesAdded(fileList) {
                if (!this.currentAlbumId) {
                    alert('Сначала создайте или выберите альбом!');
                    return;
                }

                const album = this.albums.find(a => a.id === this.currentAlbumId);
                if (!album) return;

                const imageFiles = Array.from(fileList).filter(f => f.type.startsWith('image/'));
                
                if (imageFiles.length === 0) {
                    alert('Пожалуйста, выберите файлы изображений');
                    return;
                }

                const newFiles = imageFiles.map(file => ({
                    id: Date.now() + Math.random().toString(),
                    name: file.name,
                    type: 'image',
                    size: file.size,
                    url: URL.createObjectURL(file)
                }));

                album.files = [...album.files, ...newFiles];
                this.saveAlbums();
                this.images = album.files;
                this.renderFileList();
                this.renderAlbums();

                if (this.currentImageIndex === -1) {
                    this.showImage(0);
                }
            }

            removeFile(fileId) {
                if (!this.currentAlbumId) return;
                
                const album = this.albums.find(a => a.id === this.currentAlbumId);
                if (!album) return;

                const fileIndex = album.files.findIndex(f => f.id === fileId);
                if (fileIndex === -1) return;

                const file = album.files[fileIndex];
                if (file.url) URL.revokeObjectURL(file.url);

                album.files.splice(fileIndex, 1);
                this.saveAlbums();
                this.images = album.files;
                this.renderFileList();
                this.renderAlbums();

                if (this.images.length === 0) {
                    this.clearViewer();
                } else if (this.currentImageIndex >= this.images.length) {
                    this.showImage(this.images.length - 1);
                } else {
                    this.showImage(this.currentImageIndex);
                }
            }

            renderFileList() {
                if (this.images.length === 0) {
                    this.fileList.innerHTML = `
                        <div class="empty-state">
                            <p>🖼 Перетащите изображения сюда</p>
                            <p>или нажмите кнопку "Добавить"</p>
                        </div>
                    `;
                    return;
                }

                this.fileList.innerHTML = this.images.map((file, index) => `
                    <li class="file-item ${index === this.currentImageIndex ? 'active' : ''}" 
                        data-index="${index}">
                        <img src="${file.url}" alt="${file.name}" class="thumbnail" 
                             loading="lazy">
                        <div class="file-info-mini">
                            <span class="file-name-mini" title="${file.name}">${file.name}</span>
                        </div>
                        <button class="delete-file-btn" data-file-id="${file.id}">×</button>
                    </li>
                `).join('');

                this.fileList.querySelectorAll('.file-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('delete-file-btn')) {
                            this.showImage(parseInt(item.dataset.index));
                        }
                    });
                });

                this.fileList.querySelectorAll('.delete-file-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.removeFile(btn.dataset.fileId);
                    });
                });
            }

            showImage(index) {
                if (index < 0 || index >= this.images.length) return;

                this.currentImageIndex = index;
                const image = this.images[index];
                
                // Сбрасываем зум и позицию
                this.zoomLevel = 1;
                this.imagePosition = { x: 0, y: 0 };
                
                this.imageContainer.innerHTML = `
                    <img src="${image.url}" 
                         alt="${this.escapeHtml(image.name)}"
                         id="mainImage"
                         style="transform: scale(${this.zoomLevel}) translate(${this.imagePosition.x}px, ${this.imagePosition.y}px);">
                `;

                const img = document.getElementById('mainImage');
                
                // Двойной клик для полноэкранного режима
                img.addEventListener('dblclick', () => {
                    this.toggleFullscreen();
                });

                // Drag для перемещения при увеличении
                img.addEventListener('mousedown', (e) => {
                    if (this.zoomLevel > 1) {
                        this.isDragging = true;
                        this.dragStart = { x: e.clientX, y: e.clientY };
                        img.classList.add('zoomed');
                        e.preventDefault();
                    }
                });

                this.updateImageInfo();
                this.updateControls();
                this.updateZoomLevel();
                this.renderFileList();

                // Обновляем полноэкранный режим если активен
                if (this.fullscreenOverlay.classList.contains('active')) {
                    this.fullscreenImage.src = image.url;
                }
            }

            updateImageInfo() {
                if (this.currentImageIndex >= 0 && this.currentImageIndex < this.images.length) {
                    const image = this.images[this.currentImageIndex];
                    this.imageInfo.textContent = image.name;
                    this.imageCounter.textContent = `${this.currentImageIndex + 1} / ${this.images.length}`;
                }
            }

            updateControls() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                
                prevBtn.disabled = this.images.length === 0;
                nextBtn.disabled = this.images.length === 0;
                
                if (this.images.length === 0) {
                    this.imageCounter.textContent = '0 / 0';
                    this.imageInfo.textContent = '';
                }
            }

            updateZoomLevel() {
                this.zoomLevelEl.textContent = Math.round(this.zoomLevel * 100) + '%';
            }

            nextImage() {
                if (this.images.length === 0) return;
                const nextIndex = (this.currentImageIndex + 1) % this.images.length;
                this.showImage(nextIndex);
            }

            prevImage() {
                if (this.images.length === 0) return;
                const prevIndex = this.currentImageIndex <= 0 
                    ? this.images.length - 1 
                    : this.currentImageIndex - 1;
                this.showImage(prevIndex);
            }

            zoomIn() {
                if (this.zoomLevel < 5) {
                    this.zoomLevel = Math.min(5, this.zoomLevel + 0.25);
                    this.applyZoom();
                }
            }

            zoomOut() {
                if (this.zoomLevel > 0.25) {
                    this.zoomLevel = Math.max(0.25, this.zoomLevel - 0.25);
                    if (this.zoomLevel <= 1) {
                        this.imagePosition = { x: 0, y: 0 };
                    }
                    this.applyZoom();
                }
            }

            fitToScreen() {
                this.zoomLevel = 1;
                this.imagePosition = { x: 0, y: 0 };
                this.applyZoom();
            }

            applyZoom() {
                const img = document.getElementById('mainImage');
                if (img) {
                    img.style.transform = `scale(${this.zoomLevel}) translate(${this.imagePosition.x}px, ${this.imagePosition.y}px)`;
                    this.updateZoomLevel();
                }
            }

            toggleFullscreen() {
                const overlay = this.fullscreenOverlay;
                if (overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                } else {
                    if (this.currentImageIndex >= 0) {
                        this.fullscreenImage.src = this.images[this.currentImageIndex].url;
                        overlay.classList.add('active');
                    }
                }
            }

            clearViewer() {
                this.imageContainer.innerHTML = `
                    <div class="empty-state">
                        <p>🖼 Нет изображений</p>
                        <p>Добавьте изображения в альбом</p>
                    </div>
                `;
                this.currentImageIndex = -1;
                this.zoomLevel = 1;
                this.imagePosition = { x: 0, y: 0 };
                this.updateControls();
                this.renderFileList();
            }

            showAlbumModal() {
                this.titleModal.classList.add('show');
                this.titleNameInput.value = '';
                this.titleNameInput.focus();
            }

            hideAlbumModal() {
                this.titleModal.classList.remove('show');
            }

            createAlbumFromModal() {
                const name = this.titleNameInput.value.trim();
                if (name) {
                    this.addAlbum(name);
                    this.hideAlbumModal();
                } else {
                    alert('Введите название альбома');
                }
            }

            formatSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(1024));
                return Math.round(bytes / Math.pow(1024, i)) + ' ' + sizes[i];
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            setupEventListeners() {
                // Создание альбома
                document.getElementById('addTitleBtn').addEventListener('click', () => {
                    this.showAlbumModal();
                });

                document.getElementById('createTitleBtn').addEventListener('click', () => {
                    this.createAlbumFromModal();
                });

                document.getElementById('cancelTitleBtn').addEventListener('click', () => {
                    this.hideAlbumModal();
                });

                this.titleNameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.createAlbumFromModal();
                });

                this.titleModal.addEventListener('click', (e) => {
                    if (e.target === this.titleModal) this.hideAlbumModal();
                });

                // Добавление файлов
                const addFilesBtn = document.getElementById('addFilesBtn');
                const fileInput = document.getElementById('fileInput');

                addFilesBtn.addEventListener('click', () => {
                    if (!this.currentAlbumId) {
                        alert('Сначала создайте или выберите альбом!');
                        return;
                    }
                    fileInput.click();
                });

                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        this.handleFilesAdded(e.target.files);
                        fileInput.value = '';
                    }
                });

                // Drag & drop
                const fileExplorer = document.querySelector('.file-explorer');
                
                fileExplorer.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    fileExplorer.style.background = 'rgba(233, 69, 96, 0.1)';
                });

                fileExplorer.addEventListener('dragleave', () => {
                    fileExplorer.style.background = '';
                });

                fileExplorer.addEventListener('drop', (e) => {
                    e.preventDefault();
                    fileExplorer.style.background = '';
                    if (e.dataTransfer.files.length > 0) {
                        this.handleFilesAdded(e.dataTransfer.files);
                    }
                });

                // Навигация
                document.getElementById('prevBtn').addEventListener('click', () => this.prevImage());
                document.getElementById('nextBtn').addEventListener('click', () => this.nextImage());

                // Зум
                document.getElementById('zoomInBtn').addEventListener('click', () => this.zoomIn());
                document.getElementById('zoomOutBtn').addEventListener('click', () => this.zoomOut());
                document.getElementById('fitBtn').addEventListener('click', () => this.fitToScreen());
                document.getElementById('fullscreenBtn').addEventListener('click', () => this.toggleFullscreen());

                // Полноэкранный режим
                document.getElementById('closeFullscreen').addEventListener('click', () => {
                    this.fullscreenOverlay.classList.remove('active');
                });

                this.fullscreenOverlay.addEventListener('click', (e) => {
                    if (e.target === this.fullscreenOverlay) {
                        this.fullscreenOverlay.classList.remove('active');
                    }
                });

                // Глобальные события для перемещения при зуме
                document.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const dx = e.clientX - this.dragStart.x;
                        const dy = e.clientY - this.dragStart.y;
                        this.imagePosition.x += dx;
                        this.imagePosition.y += dy;
                        this.dragStart = { x: e.clientX, y: e.clientY };
                        this.applyZoom();
                    }
                });

                document.addEventListener('mouseup', () => {
                    this.isDragging = false;
                    const img = document.getElementById('mainImage');
                    if (img) img.classList.remove('zoomed');
                });

                // Колесико мыши для зума
                this.imageContainer.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        this.zoomIn();
                    } else {
                        this.zoomOut();
                    }
                });

                // Горячие клавиши
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    
                    switch(e.key) {
                        case 'ArrowRight':
                            e.preventDefault();
                            this.nextImage();
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            this.prevImage();
                            break;
                        case '+':
                        case '=':
                            e.preventDefault();
                            this.zoomIn();
                            break;
                        case '-':
                            e.preventDefault();
                            this.zoomOut();
                            break;
                        case '0':
                            e.preventDefault();
                            this.fitToScreen();
                            break;
                        case 'f':
                        case 'F':
                            e.preventDefault();
                            this.toggleFullscreen();
                            break;
                        case 'Escape':
                            this.hideAlbumModal();
                            if (this.fullscreenOverlay.classList.contains('active')) {
                                this.fullscreenOverlay.classList.remove('active');
                            }
                            break;
                    }
                });
            }
        }

        // Запуск
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new ImageGalleryApp();
            console.log('🖼 Галерея изображений запущена!');
            console.log('Управление:');
            console.log('← → - переключение изображений');
            console.log('+/- - увеличение/уменьшение');
            console.log('0 - сброс масштаба');
            console.log('F - полноэкранный режим');
            console.log('Колесико мыши - зум');
            console.log('Перетаскивание при увеличении');
        });
    </script>
</body>
</html>
